version: 2

project_name: odins

before:
  hooks:
    - go mod tidy

builds:
  - id: odins
    main: .
    binary: odins
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: odins-archive
    name_template: "odins_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md
      - .odins

brews:
  - name: odins
    repository:
      owner: adialaleal
      name: homebrew-odins
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/adialaleal/odins"
    description: "The All-Father of Local DNS — Local DNS + Reverse Proxy manager for macOS"
    license: "MIT"
    install: |
      bin.install "odins"
    test: |
      assert_match "ODINS", shell_output("#{bin}/odins --help")

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: adialaleal
    name: odins
  draft: false
  prerelease: auto
  name_template: "ODINS v{{.Version}}"
  header: |
    ## ODINS v{{.Version}} — The All-Father of Local DNS

    Install:
    ```bash
    curl -fsSL https://raw.githubusercontent.com/adialaleal/odins/main/install.sh | bash
    ```
